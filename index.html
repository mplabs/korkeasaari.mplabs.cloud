<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Timer</title>
</head>
<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden relative
             bg-linear-to-bl from-ocean-deep via-ocean to-ocean-light text-white font-sans">

  <!-- Stars -->
  <div id="stars" class="fixed inset-0 bottom-1/2 pointer-events-none z-0"></div>

  <!-- Content -->
  <div class="w-full max-w-3xl px-6 py-10 relative z-10">

    <!-- Icon -->
    <div class="text-center text-5xl mb-6 drop-shadow-lg select-none">🏝️</div>

    <!-- Header -->
    <header class="text-center mb-12">
      <h1 id="destination"
          class="text-4xl sm:text-5xl font-extralight tracking-[0.15em] uppercase
                 [text-shadow:0_2px_20px_rgba(0,0,0,0.3)]">
      </h1>
      <p class="mt-1 text-sm tracking-[0.3em] uppercase opacity-60">Island Timer</p>
    </header>

    <!-- Counter cards -->
    <div class="grid grid-cols-2 gap-4 sm:gap-8 mb-10">

      <!-- Since -->
      <div class="group rounded-2xl p-6 sm:p-8 text-center
                  bg-white/8 backdrop-blur-md border border-white/10
                  transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
        <div class="text-xs uppercase tracking-[0.25em] opacity-55 mb-3">Days since</div>
        <div id="days-since"
             class="text-5xl sm:text-7xl font-extralight leading-none text-sand mb-1">—</div>
        <div class="text-sm opacity-45 tracking-wide">days ago</div>
        <div id="last-date" class="mt-4 text-xs opacity-40"></div>
      </div>

      <!-- Until -->
      <div class="group rounded-2xl p-6 sm:p-8 text-center
                  bg-white/8 backdrop-blur-md border border-white/10
                  transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl">
        <div class="text-xs uppercase tracking-[0.25em] opacity-55 mb-3">Days until</div>
        <div id="days-until"
             class="text-5xl sm:text-7xl font-extralight leading-none text-sunset-bright mb-1">—</div>
        <div class="text-sm opacity-45 tracking-wide">days left</div>
        <div id="next-date" class="mt-4 text-xs opacity-40"></div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="mb-6">
      <div class="flex justify-between text-[0.7rem] uppercase tracking-wide opacity-40 mb-2">
        <span id="progress-start"></span>
        <span id="progress-end"></span>
      </div>

      <div class="w-full h-2 bg-white/10 rounded-full overflow-visible relative">
        <div id="progress-fill"
             class="h-full rounded-full transition-[width] duration-[1500ms] ease-out relative
                    bg-gradient-to-r from-sand via-sunset-bright to-sunset"
             style="width: 0%">
          <!-- Marker dot -->
          <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2
                      w-4 h-4 bg-white rounded-full
                      shadow-[0_0_12px_rgba(244,228,186,0.6),0_0_24px_rgba(244,228,186,0.3)]">
          </div>
        </div>
      </div>

      <p id="progress-percent" class="text-center text-sm opacity-45 mt-3 tracking-wide"></p>
    </div>
  </div>

  <!-- Waves -->
  <div class="fixed bottom-0 left-0 w-full h-28 z-[1] pointer-events-none">
    <div class="absolute bottom-0 -left-[5%] w-[110%] h-full opacity-15 animate-wave-slow">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" class="w-full h-full">
        <path d="M0,40 C360,100 720,0 1080,60 C1260,90 1380,50 1440,40 L1440,120 L0,120 Z"
              fill="rgba(255,255,255,0.3)"/>
      </svg>
    </div>
    <div class="absolute -bottom-2 -left-[5%] w-[110%] h-full opacity-10 animate-wave-slower">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" class="w-full h-full">
        <path d="M0,60 C240,20 480,90 720,50 C960,10 1200,80 1440,50 L1440,120 L0,120 Z"
              fill="rgba(255,255,255,0.25)"/>
      </svg>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
